<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 交流平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="article-container">
        <div class="nav" id="navArea">
            <!-- 动态显示登录/用户信息 -->
        </div>

        <h1 id="articleTitle">加载中...</h1>
        <div id="articleContent">正在加载文章内容...</div>

        <div class="comment-section">
            <h2>💬 评论区</h2>
            <div id="commentsList">
                <!-- 评论列表 -->
            </div>
            
            <div style="margin-top: 20px;" id="commentFormArea">
                <h3>📝 发表评论</h3>
                <div id="commentMessage" style="margin-bottom: 15px; display: none;"></div>
                <form id="commentForm">
                    <div class="form-group">
                        <textarea id="commentContent" rows="4" placeholder="写下你的评论..." required></textarea>
                    </div>
                    <button type="submit">提交评论</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/article.js"></script>
</body>
</html>
