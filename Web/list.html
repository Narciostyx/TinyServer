<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章列表 - 交流平台</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { align-items: flex-start; padding-top: 20px; }
        .nav { text-align: right; margin-bottom: 20px; }
        .article-item {
            padding: 15px;
            border-bottom: 1px solid #ccc;
        }
        .article-item:last-child {
            border-bottom: none;
        }
        .article-item h2 {
            margin: 0 0 10px 0;
            text-align: left;
        }
        .article-item h2 a {
            text-decoration: none;
            color: #007bff;
        }
        .article-item h2 a:hover {
            text-decoration: underline;
        }
        .article-meta {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="article-container">
        <div class="nav" id="navArea">
            <!-- 动态显示登录/用户信息 -->
        </div>

        <h1>文章列表</h1>
        <div id="articleList">
            <p>加载中...</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/list.js"></script>
</body>
</html>
